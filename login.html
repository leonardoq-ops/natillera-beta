<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natillera Digital — Ingresa a Tu Cuenta</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-container">

        <div class="login-logo">
            <div class="logo-text">Natillera <span>digital</span></div>
            <div class="logo-subtitle">Beta Piloto</div>
        </div>

        <h1 class="login-title">Ingresa a Tu Cuenta</h1>
        <p class="login-subtitle">Accede a tu dashboard y ve tu cosecha crecer</p>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Recuérdame</label>
                </div>
                <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
            </div>
            <button type="submit" class="login-button">Ingresar</button>
        </form>

        <div class="divider"><span>¿Primera vez?</span></div>

        <div class="signup-section">
            <p class="signup-text">
                ¿Aún no tienes cuenta?<br>
                <a href="index.html" class="signup-link">Solicita acceso al piloto →</a>
            </p>
        </div>

        <div class="back-to-home">
            <a href="index.html" class="back-link">← Volver a Inicio</a>
        </div>

    </div>

    <script>
        const DEMO_CREDENTIALS = {
            'test@natillera.com':  'natillera123',
            'demo@natillera.com':  'demo123',
            'pilot@natillera.com': 'pilot123'
        };

        function handleLogin(event) {
            event.preventDefault();
            const email    = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg   = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');

            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            if (DEMO_CREDENTIALS[email] && DEMO_CREDENTIALS[email] === password) {
                successMsg.textContent = '✓ Ingreso exitoso. Redirigiendo al dashboard...';
                successMsg.classList.add('show');
                localStorage.setItem('natillera_user', JSON.stringify({
                    email: email,
                    loginTime: new Date().toISOString()
                }));
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
            } else {
                errorMsg.textContent = '✗ Email o contraseña incorrectos. Intenta de nuevo.';
                errorMsg.classList.add('show');
                document.getElementById('password').value = '';
            }
        }

        console.log('Beta Testing Credentials:', DEMO_CREDENTIALS);
    </script>

</body>
</html>
