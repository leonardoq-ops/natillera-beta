<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natillera Digital — Ingresa a Tu Cuenta</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Login Page Specific Styles */
    body {
      background: linear-gradient(135deg, #f9f8f6 0%, #f5f0e8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background-color: #ffffff;
      border: 2px solid #C9A84C;
      border-radius: 12px;
      padding: 50px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 24px rgba(26, 43, 74, 0.15);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 600;
      color: #1A2B4A;
    }

    .logo-text span {
      color: #C9A84C;
    }

    .logo-subtitle {
      font-size: 12px;
      color: #5a5450;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 10px;
    }

    .login-title {
      font-size: 24px;
      color: #1A2B4A;
      margin-bottom: 10px;
      text-align: center;
      font-weight: 600;
    }

    .login-subtitle {
      font-size: 14px;
      color: #5a5450;
      text-align: center;
      margin-bottom: 40px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      font-size: 13px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .remember-me input {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .remember-me label {
      margin: 0;
      text-transform: none;
      letter-spacing: normal;
      font-weight: 400;
    }

    .forgot-password {
      color: #C9A84C;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .forgot-password:hover {
      color: #a68932;
    }

    .login-button {
      background-color: #1A2B4A;
      color: #ffffff;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(26, 43, 74, 0.15);
    }

    .login-button:hover {
      background-color: #0f1a2e;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(26, 43, 74, 0.25);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .divider {
      text-align: center;
      margin: 30px 0;
      font-size: 12px;
      color: #b8b3aa;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background-color: #e8e6e1;
    }

    .divider span {
      background-color: #ffffff;
      padding: 0 10px;
      position: relative;
      z-index: 1;
    }

    .signup-section {
      text-align: center;
    }

    .signup-text {
      font-size: 13px;
      color: #5a5450;
    }

    .signup-link {
      color: #C9A84C;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .signup-link:hover {
      color: #a68932;
    }

    .back-to-home {
      text-align: center;
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid #e8e6e1;
    }

    .back-link {
      color: #1A2B4A;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: #C9A84C;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 40px 25px;
      }

      .login-title {
        font-size: 20px;
      }

      .login-logo {
        margin-bottom: 30px;
      }

      .logo-text {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<div class="login-container">

  <!-- LOGO -->
  <div class="login-logo">
    <div class="logo-text">Natillera <span>digital</span></div>
    <div class="logo-subtitle">Beta Piloto</div>
  </div>

  <!-- TITLE -->
  <h1 class="login-title">Ingresa a Tu Cuenta</h1>
  <p class="login-subtitle">Accede a tu dashboard y ve tu cosecha crecer</p>

  <!-- MESSAGES -->
  <div class="error-message" id="errorMessage"></div>
  <div class="success-message" id="successMessage"></div>

  <!-- FORM -->
  <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
    
    <div class="form-group">
      <label for="email">Correo Electrónico</label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        placeholder="tu@email.com" 
        required
        autocomplete="email"
      >
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input 
        type="password" 
        id="password" 
        name="password" 
        placeholder="••••••••" 
        required
        autocomplete="current-password"
      >
    </div>

    <div class="form-options">
      <div class="remember-me">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Recuérdame</label>
      </div>
      <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
    </div>

    <button type="submit" class="login-button">Ingresar</button>

  </form>

  <!-- DIVIDER -->
  <div class="divider">
    <span>¿Primera vez?</span>
  </div>

  <!-- SIGNUP -->
  <div class="signup-section">
    <p class="signup-text">
      ¿Aún no tienes cuenta?<br>
      <a href="index.html" class="signup-link">Solicita acceso al piloto →</a>
    </p>
  </div>

  <!-- BACK TO HOME -->
  <div class="back-to-home">
    <a href="index.html" class="back-link">← Volver a Inicio</a>
  </div>

</div>

<script>
  // Demo credentials for beta testing
  const DEMO_CREDENTIALS = {
    'test@natillera.com': 'natillera123',
    'demo@natillera.com': 'demo123',
    'pilot@natillera.com': 'pilot123'
  };

  function handleLogin(event) {
    event.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMessage');
    const successMsg = document.getElementById('successMessage');

    // Clear previous messages
    errorMsg.classList.remove('show');
    successMsg.classList.remove('show');

    // Check credentials against demo data
    if (DEMO_CREDENTIALS[email] && DEMO_CREDENTIALS[email] === password) {
      // Success
      successMsg.textContent = '✓ Ingreso exitoso. Redirigiendo al dashboard...';
      successMsg.classList.add('show');

      // Store login state (demo only)
      localStorage.setItem('natillera_user', JSON.stringify({
        email: email,
        loginTime: new Date().toISOString()
      }));

      // Redirect to dashboard after 1.5 seconds
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1500);

    } else {
      // Failure
      errorMsg.textContent = '✗ Email o contraseña incorrectos. Intenta de nuevo.';
      errorMsg.classList.add('show');
      document.getElementById('password').value = '';
    }
  }

  // Demo credentials hint (for beta testing)
  console.log('Demo Credentials (Beta Testing):');
  console.log(DEMO_CREDENTIALS);
  console.log('Try: test@natillera.com / natillera123');
</script>

</body>
</html>
